<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="אימון סל"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#FF6B35"/>
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23FF6B35'/><path d='M50 5v90M5 50h90M25 15a40 40 0 0 1 0 70M75 15a40 40 0 0 0 0 70' stroke='%231a1a1a' stroke-width='4' fill='none'/></svg>"/>
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23FF6B35'/><path d='M50 5v90M5 50h90M25 15a40 40 0 0 1 0 70M75 15a40 40 0 0 0 0 70' stroke='%231a1a1a' stroke-width='4' fill='none'/></svg>"/>
<title>אימון סל - מתמטיקה לאלופים</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0; min-height: 100vh; min-height: 100dvh;
  font-family: -apple-system, BlinkMacSystemFont, 'Heebo', 'Rubik', 'SF Hebrew', 'Arial Hebrew', system-ui, sans-serif;
  background-color: #d48842;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><path d='M0 20h100M0 40h100M0 60h100M0 80h100M20 0v20M70 20v20M40 40v20M90 60v20M30 80v20' stroke='rgba(0,0,0,0.1)' stroke-width='2'/></svg>");
  color: #1a1a1a;
  -webkit-text-size-adjust: 100%;
  overflow-x: hidden;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

.app-header {
  position: sticky; top: 0; z-index: 50;
  background-color: rgba(26,26,26,0.95);
  border-bottom: 4px solid #FF6B35;
  padding: 12px 20px;
  display: flex; justify-content: space-between; align-items: center;
  padding-top: calc(12px + env(safe-area-inset-top));
}
.app-title {
  color: #FF6B35; font-size: 22px; font-weight: 900; margin: 0;
  text-shadow: 1px 1px 0 #000;
}
@media(min-width: 700px) { .app-title { font-size: 28px; } }
.user-status {
  color: #fff; font-size: 16px; font-weight: bold;
}
@media(min-width: 700px) { .user-status { font-size: 20px; } }

.app-container {
  max-width: 900px; margin: 20px auto; padding: 0 15px;
}
.court-card {
  background-color: rgba(255,255,255,0.97);
  border-radius: 25px; border: 4px solid #1a1a1a;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  padding: 25px 20px; position: relative; overflow: hidden;
}

.btn-large {
  font-size: 20px; font-weight: 700; padding: 16px 28px; border-radius: 35px;
  cursor: pointer; border: 3px solid #1a1a1a; box-shadow: 0 5px 0 #1a1a1a;
  transition: transform 0.1s, box-shadow 0.1s;
  font-family: inherit;
  display: inline-flex; align-items: center; justify-content: center; gap: 12px; text-align: center;
  min-height: 60px; min-width: 60px;
  touch-action: manipulation; user-select: none; -webkit-touch-callout: none;
}
@media(min-width: 700px) { .btn-large { font-size: 24px; padding: 18px 32px; } }
.btn-large:active { transform: translateY(5px); box-shadow: 0 0 0 #1a1a1a; }
.btn-large:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: 0 2px 0 #1a1a1a; transform: translateY(3px); }

.btn-orange { background-color: #FF6B35; color: #fff; }
.btn-black { background-color: #1a1a1a; color: #fff; border: 3px solid #FF6B35; box-shadow: 0 5px 0 #FF6B35; }
.btn-white { background-color: #fff; color: #1a1a1a; border: 3px solid #1a1a1a; }
.btn-green { background-color: #28a745; color: #fff; border: 3px solid #1a1a1a; box-shadow: 0 5px 0 #1a1a1a; }
.btn-red { background-color: #dc3545; color: #fff; border: 3px solid #1a1a1a; box-shadow: 0 5px 0 #1a1a1a; }

.topic-card {
  background: #fff; border: 3px solid #1a1a1a; border-radius: 20px; padding: 25px 15px;
  cursor: pointer; text-align: center; font-size: 22px; font-weight: bold;
  transition: transform 0.2s; box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  touch-action: manipulation; user-select: none;
}
.topic-card:active { transform: scale(0.96); border-color: #FF6B35; }

.fraction { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; margin: 0 8px; font-weight: bold; }
.fraction span:first-child { border-bottom: 3px solid #1a1a1a; padding: 0 5px; }
.fraction span:last-child { padding: 0 5px; }

input[type="text"], input[type="number"], input[type="date"] {
  font-family: inherit; font-size: 22px; padding: 14px 18px;
  border-radius: 15px; border: 3px solid #1a1a1a; text-align: center; width: 100%;
  background: #fff; color: #1a1a1a;
}
input:focus { outline: none; border-color: #FF6B35; box-shadow: 0 0 10px rgba(255,107,53,0.5); }

.upload-area {
  border: 3px dashed #FF6B35; border-radius: 15px; padding: 20px; text-align: center;
  background: #fff5f0; cursor: pointer; margin-top: 12px; width: 100%;
  touch-action: manipulation; user-select: none;
  display: block;
}
.upload-area:active { background: #ffe4d6; }

.feedback-box {
  border-radius: 15px; padding: 18px; margin-top: 18px; font-size: 20px; font-weight: bold; display: none;
  border: 3px solid #1a1a1a;
}
.feedback-correct { background: #d4edda; color: #155724; border-color: #28a745; }
.feedback-wrong { background: #f8d7da; color: #721c24; border-color: #dc3545; }

.bar-container { width: 100%; background: #fff; border: 3px solid #1a1a1a; border-radius: 20px; height: 28px; overflow: hidden; margin-top: 5px; position: relative; }
.bar-fill { height: 100%; background-color: #FF6B35; transition: width 0.5s; position: relative; }

.plan-card {
  background: linear-gradient(135deg, #fff, #f8f9fa); border: 4px solid #FF6B35; border-radius: 20px;
  padding: 20px; margin-bottom: 18px; box-shadow: 0 6px 12px rgba(255,107,53,0.2);
  position: relative; overflow: hidden;
}
.plan-card-done { border-color: #28a745; background: #f0fff4; box-shadow: 0 6px 12px rgba(40,167,69,0.2); }

.radio-btn-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.radio-btn {
  border: 3px solid #1a1a1a; border-radius: 15px; padding: 12px 18px; background: #fff;
  font-size: 18px; font-weight: bold; cursor: pointer; transition: all 0.2s;
  min-height: 50px; touch-action: manipulation; user-select: none;
}
.radio-btn.selected { background: #FF6B35; color: #fff; }

.day-check {
  width: 48px; height: 48px; border: 3px solid #1a1a1a; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold;
  cursor: pointer; background: #fff; transition: all 0.2s;
  touch-action: manipulation; user-select: none;
}
.day-check.selected { background: #dc3545; color: #fff; }

.smart-reminder {
  background-color: #1a1a1a; color: #fff; padding: 14px; border-radius: 15px;
  margin-bottom: 18px; text-align: center; font-size: 18px; font-weight: bold;
  border: 2px solid #FF6B35;
}

.modal-overlay {
  position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7);
  z-index: 1000; display:flex; justify-content:center; align-items:center; padding: 20px;
}
.modal-content {
  background:#fff; border:4px solid #FF6B35; border-radius:20px; width:100%; max-width:480px;
  padding:25px; text-align:center; position:relative;
}

.menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.menu-grid .btn-large { flex-direction: column; padding: 18px 10px; min-height: 110px; font-size: 18px; }
.menu-grid .btn-large > span:first-child { font-size: 38px; margin-bottom: 4px; }

.qbox {
  font-size: 26px; font-weight: bold; color: #1a1a1a; text-align: center;
  background:#fff5f0; padding:22px; border-radius:20px; width:100%;
  border:3px solid #ffe4d6; margin-bottom: 18px;
}
@media(min-width: 700px) { .qbox { font-size: 32px; } }

.q-options { display:flex; justify-content:center; gap:14px; flex-wrap:wrap; width:100%; }
.q-options .btn-large { font-size: 24px; min-width: 130px; flex: 0 1 auto; }

.session-stats-bar {
  display:flex; gap:15px; flex-wrap: wrap; font-size:16px; font-weight:bold;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #FF6B35; border-radius: 3px; }
</style>
</head>
<body>
<header class="app-header">
  <h1 class="app-title">🏀 אימון סל - מתמטיקה לאלופים 🏀</h1>
  <div id="user-status" class="user-status"></div>
</header>
<main class="app-container">
  <section id="app-root" class="court-card"></section>
</main>
<script>
const qBank = [];
function addQ(topic, subtopic, q, a, exp, diff, options=null) {
  qBank.push({topic, subtopic, question: q, answer: a, explanation: exp, difficulty: diff, options});
}

// Fractions - same denominator comparison
for(let i=2; i<=10; i++) {
  for(let j=1; j<i; j++) {
    if(j+1 < i) {
      addQ('fractions', 'comp_same_denom', `איזה שבר גדול יותר? <div class="fraction"><span>${j}</span><span>${i}</span></div> או <div class="fraction"><span>${j+1}</span><span>${i}</span></div>?`, `${j+1}/${i}`, `כאשר המכנה זהה, מסתכלים על המונה. המונה הגדול יותר הוא השבר הגדול יותר. ${j+1} גדול מ-${j}.`, 1, [`${j}/${i}`, `${j+1}/${i}`, 'שווים']);
    }
  }
}
// Same numerator
for(let i=2; i<=6; i++) {
  for(let j=i+1; j<=9; j++) {
    addQ('fractions', 'comp_same_num', `איזה שבר גדול יותר? <div class="fraction"><span>2</span><span>${i}</span></div> או <div class="fraction"><span>2</span><span>${j}</span></div>?`, `2/${i}`, `כאשר המונים זהים, המכנה הקטן מציין חלקים גדולים יותר, ולכן השבר גדול יותר.`, 2, [`2/${i}`, `2/${j}`, 'שווים']);
  }
}
// Equivalent
[['1/2','3/6'],['1/3','2/6'],['1/4','2/8'],['3/4','6/8'],['2/5','4/10']].forEach(pair => {
  addQ('fractions', 'equivalent', `האם השברים <div class="fraction"><span>${pair[0].split('/')[0]}</span><span>${pair[0].split('/')[1]}</span></div> ו- <div class="fraction"><span>${pair[1].split('/')[0]}</span><span>${pair[1].split('/')[1]}</span></div> שווים?`, `כן`, `כן, אם נרחיב או נצמצם שבר אחד באותו מספר במונה ובמכנה, נקבל את השני.`, 2, ['כן', 'לא']);
});
// Addition
for(let i=3; i<=8; i++) {
  for(let j=1; j<i-1; j++) {
    addQ('fractions', 'addition', `פתור: <div class="fraction"><span>${j}</span><span>${i}</span></div> + <div class="fraction"><span>1</span><span>${i}</span></div> = ?`, `${j+1}/${i}`, `בחיבור שברים עם מכנה זהה, מחברים את המונים והמכנה נשאר זהה. ${j}+1=${j+1}.`, 1, [`${j+1}/${i}`, `${j+1}/${i+i}`, `${j}/${i}`]);
  }
}
// Part of quantity
[{t:12,f:1,d:3,a:4},{t:20,f:1,d:4,a:5},{t:30,f:1,d:5,a:6},{t:15,f:2,d:3,a:10},{t:24,f:3,d:4,a:18}].forEach(p => {
  addQ('fractions', 'part_of_quantity', `בקבוצה ${p.t} שחקנים. <div class="fraction"><span>${p.f}</span><span>${p.d}</span></div> מהם על הספסל. כמה שחקנים על הספסל?`, `${p.a}`, `מחלקים את ${p.t} ב-${p.d} ומכפילים ב-${p.f}. = ${p.a}.`, 3);
});

// Natural numbers
[10,100,1000].forEach(mult => {
  for(let i=2; i<=25; i+=3) {
    addQ('natural', 'mult_10_100', `פתור: ${i} × ${mult} = ?`, `${i*mult}`, `בכפל ב-${mult}, מוסיפים ${mult.toString().length-1} אפסים למספר המקורי.`, 1);
    if(i < 10) addQ('natural', 'div_10_100', `פתור: ${i*mult*10} ÷ 10 = ?`, `${i*mult}`, `בחילוק ב-10, מורידים אפס אחד.`, 1);
  }
});
for(let i=12; i<=45; i+=5) {
  for(let j=2; j<=9; j+=2) {
    addQ('natural', 'vertical_mult', `פתור: ${i} × ${j} = ?`, `${i*j}`, `כפל במאונך: אחדות ${i%10}×${j}, עשרות ${Math.floor(i/10)*10}×${j}, מחברים.`, 2);
  }
}
addQ('natural', 'order_of_op', `פתור: 5 + 3 × 4 = ?`, `17`, `כפל קודם לחיבור: 3×4=12. ואז 5+12=17.`, 2);
addQ('natural', 'order_of_op', `פתור: (5 + 3) × 4 = ?`, `32`, `סוגריים קודמים: 5+3=8. אז 8×4=32.`, 2);
addQ('natural', 'word_prob', `לקבוצת כדורסל תקציב של 50,000 ש"ח. קנו כדורים ומדים ב-15,000 ש"ח. כמה נשאר?`, `35000`, `50,000-15,000=35,000.`, 2);
addQ('natural', 'word_prob', `באולם כדורסל יש 4 יציעים. בכל יציע 2,000 אוהדים. כמה אוהדים בסה"כ?`, `8000`, `4×2,000=8,000 אוהדים.`, 2);
addQ('natural', 'word_prob', `דני קלע 3 שלשות (3 נק' כל אחת), ורון קלע 4 סלים רגילים (2 נק' כל אחד). למי יותר נקודות?`, `דני`, `דני: 3×3=9. רון: 4×2=8. לדני יותר.`, 3, ['דני','רון','שווה']);
addQ('natural', 'word_prob', `המשחק מחולק ל-4 רבעים. כל רבע 10 דקות. כמה דקות במשחק?`, `40`, `4×10=40 דקות.`, 1);

// Geometry with SVG
const shapes = [{w:5,h:4,a:20,p:18},{w:10,h:2,a:20,p:24},{w:6,h:6,a:36,p:24},{w:7,h:3,a:21,p:20}];
shapes.forEach(s => {
  const name = s.w===s.h ? 'ריבוע' : 'מלבן';
  const svg = `<br><svg width='120' height='80'><rect x='10' y='10' width='${s.w*10}' height='${s.h*10}' fill='%23FF6B35' fill-opacity='0.2' stroke='%23FF6B35' stroke-width='4'/><text x='${s.w*5}' y='${s.h*10+25}' font-size='18' fill='%23000' font-weight='bold'>${s.w}</text><text x='${s.w*10+15}' y='${s.h*5+15}' font-size='18' fill='%23000' font-weight='bold'>${s.h}</text></svg>`;
  addQ('geometry', 'area', `מה השטח של ה${name} הבא? (סמ"ר)${svg}`, `${s.a}`, `שטח=צלע×צלע סמוכה. ${s.w}×${s.h}=${s.a}.`, 2);
  addQ('geometry', 'perimeter', `מה ההיקף של ה${name} הבא? (ס"מ)${svg}`, `${s.p}`, `היקף=סכום כל הצלעות. ${s.w}+${s.w}+${s.h}+${s.h}=${s.p}.`, 2);
});
addQ('geometry', 'angles', `איזו זווית בפינת מגרש הכדורסל?`, `ישרה`, `בפינת מלבן זווית ישרה (90°).`, 1, ['ישרה','חדה','קהה','שטוחה']);
addQ('geometry', 'sides', `קווי האורך של המגרש (הארוכים) הם קווים...`, `מקבילים`, `צלעות נגדיות במלבן מקבילות.`, 1, ['מקבילים','מאונכים','נחתכים']);
addQ('geometry', 'diagonals', `כמה אלכסונים אפשר למתוח במלבן?`, `2`, `במלבן בדיוק 2 אלכסונים.`, 2, ['1','2','3','4']);

// Random batch
for(let k=0; k<25; k++){
  let n1 = Math.floor(Math.random()*80)+10;
  let n2 = Math.floor(Math.random()*80)+10;
  addQ('natural', 'add_sub', `פתור: ${n1+n2} - ${n1} = ?`, `${n2}`, `חיסור פשוט.`, 1);
  let n3 = Math.floor(Math.random()*900)+100;
  let n4 = Math.floor(Math.random()*900)+100;
  addQ('natural', 'add_sub_large', `פתור: ${n3} + ${n4} = ?`, `${n3+n4}`, `חיבור במאונך.`, 3);
}

let state = {
  name: '', score: 0, streak: 0, medals: [], testCompleted: false,
  initialScores: { fractions: 0, natural: 0, geometry: 0 },
  currentScores: { fractions: 0, natural: 0, geometry: 0 },
  initialLevel: { fractions: 1, natural: 1, geometry: 1 },
  level: { fractions: 1, natural: 1, geometry: 1 },
  history: [], plan: null
};

const topicsHebrew = { 'fractions':'שברים', 'natural':'מספרים טבעיים', 'geometry':'גיאומטריה', 'mixed':'מעורב כללי' };
const phaseNames = { 'יסודות':'שלב 1: חימום על המגרש', 'חיזוק':'שלב 2: אימוני כוח', 'שיא':'שלב 3: משחקי ליגה' };

function loadState() {
  try {
    const saved = localStorage.getItem('basketMathChampionsV5');
    if (saved) {
      state = JSON.parse(saved);
      if(!state.currentScores) state.currentScores = {...state.initialScores};
    }
  } catch(e) {}
}
function saveState() {
  try { localStorage.setItem('basketMathChampionsV5', JSON.stringify(state)); } catch(e) {}
  updateHeader();
}

const root = document.getElementById('app-root');

function updateHeader() {
  const el = document.getElementById('user-status');
  if(state.name) el.innerHTML = `MVP: ${state.name} | 🏆 ${state.score}`;
  else el.innerHTML = '';
}

function renderLogin() {
  root.innerHTML = `
    <div style="display:flex; flex-direction:column; align-items:center; text-align:center; padding: 10px;">
      <div style="font-size:80px; line-height:1; margin-bottom:10px;">🏀</div>
      <h1 style="font-size: 38px; color: #1a1a1a; margin:0 0 15px 0;">עולים למגרש!</h1>
      <p style="font-size: 20px; color: #333; margin: 0 0 25px 0;">איך קוראים לשחקן שלנו?</p>
      <input type="text" id="playerNameInput" autocomplete="given-name" enterkeyhint="done" placeholder="הקלד את שמך כאן..." style="width: 100%; max-width: 400px; margin-bottom: 25px;" onkeypress="if(event.key==='Enter') doLogin()">
      <button class="btn-large btn-orange" style="font-size:24px;" onclick="doLogin()">כדור ראשון שלי! ⛹️‍♂️</button>
      <p style="font-size: 14px; color: #666; margin-top: 25px; padding: 12px; background: #fff5f0; border-radius: 12px; border: 1px solid #FF6B35;">💡 טיפ: ניתן להוסיף את האפליקציה למסך הבית של ה-iPad - לחץ על כפתור השיתוף בספארי ובחר 'הוסף למסך הבית' לחוויה מיטבית</p>
    </div>
  `;
  setTimeout(()=>{ const i=document.getElementById('playerNameInput'); if(i) i.focus(); }, 100);
}

function doLogin() {
  const name = document.getElementById('playerNameInput').value.trim();
  if(!name) { alert('חובה להזין שם!'); return; }
  state.name = name;
  saveState();
  if(!state.plan) renderPlanSetup();
  else renderMenu();
}

let tempDuration = 15;
let tempRestDays = [6];
function renderPlanSetup() {
  root.innerHTML = `
    <div style="padding: 5px;">
      <h2 style="font-size: 28px; color: #1a1a1a; margin: 0 0 15px 0; text-align:center;">🏀 ${state.name}, בוא נכין תוכנית מנצחת!</h2>
      <div style="background:#fff; padding:20px; border-radius:20px; border:3px solid #1a1a1a;">
        <h3 style="margin:0 0 10px 0; font-size:20px;">📅 מתי המבחן שלך?</h3>
        <input type="date" id="examDateInput" style="margin-bottom:18px;">
        <h3 style="font-size:20px; margin:0 0 10px 0;">⏱️ כמה זמן אתה רוצה להתאמן בכל יום?</h3>
        <div class="radio-btn-group" style="margin-bottom:18px;">
          <div class="radio-btn" onclick="setTempDuration(10, this)">10 דק'</div>
          <div class="radio-btn selected" onclick="setTempDuration(15, this)">15 דק' ⭐</div>
          <div class="radio-btn" onclick="setTempDuration(20, this)">20 דק'</div>
          <div class="radio-btn" onclick="setTempDuration(25, this)">25 דק'</div>
        </div>
        <h3 style="font-size:20px; margin:0 0 10px 0;">📆 ימי מנוחה (לא מתאמן)?</h3>
        <div style="display:flex; gap:8px; justify-content:center; margin-bottom:20px; direction:rtl; flex-wrap:wrap;">
          ${['א','ב','ג','ד','ה','ו','ש'].map((d,i) => `<div class="day-check ${i===6?'selected':''}" onclick="toggleTempRest(${i}, this)">${d}'</div>`).join('')}
        </div>
        <button class="btn-large btn-orange" style="width:100%;" onclick="createPlan()">בנה לי תוכנית! 🏀</button>
      </div>
    </div>
  `;
  const tmrw = new Date();
  tmrw.setDate(tmrw.getDate() + 14);
  document.getElementById('examDateInput').value = tmrw.toISOString().split('T')[0];
}

function setTempDuration(val, el) {
  tempDuration = val;
  el.parentElement.querySelectorAll('.radio-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
}
function toggleTempRest(dayIdx, el) {
  if(tempRestDays.includes(dayIdx)) { tempRestDays = tempRestDays.filter(d => d !== dayIdx); el.classList.remove('selected'); }
  else { tempRestDays.push(dayIdx); el.classList.add('selected'); }
}

function createPlan() {
  const ed = document.getElementById('examDateInput').value;
  if(!ed) return alert("בחר תאריך למבחן");
  state.plan = {
    examDate: ed, dailyDuration: tempDuration, restDays: tempRestDays,
    planStartDate: new Date().toISOString().split('T')[0],
    currentDay: 1, trainingPlan: [], lastSessionDate: null
  };
  if(state.testCompleted) generateTrainingPlan();
  saveState();
  renderMenu();
}

function shiftMissedDays() {
  if(!state.plan || state.plan.trainingPlan.length === 0) return;
  const todayStr = new Date().toISOString().split('T')[0];
  let currIdx = state.plan.currentDay - 1;
  if(currIdx >= state.plan.trainingPlan.length) return;
  let expectedDate = state.plan.trainingPlan[currIdx].dateStr;
  if (todayStr > expectedDate && state.plan.lastSessionDate !== todayStr) {
    let d = new Date();
    for(let i = currIdx; i < state.plan.trainingPlan.length; i++) {
      while(state.plan.restDays.includes(d.getDay())) d.setDate(d.getDate()+1);
      state.plan.trainingPlan[i].dateStr = d.toISOString().split('T')[0];
      d.setDate(d.getDate()+1);
    }
    saveState();
  }
}

function generateTrainingPlan() {
  if(!state.plan || !state.testCompleted) return;
  const startD = new Date(state.plan.planStartDate);
  const endD = new Date(state.plan.examDate);
  const plan = [];
  let curr = new Date(startD);
  let dayNum = 1;
  const dates = [];
  while(curr <= endD) {
    if(!state.plan.restDays.includes(curr.getDay())) dates.push(new Date(curr));
    curr.setDate(curr.getDate()+1);
  }
  const total = Math.max(dates.length, 3);
  const p1 = Math.ceil(total * 0.33);
  const p2 = Math.ceil(total * 0.66);
  const allTopics = ['fractions','natural','geometry'];
  let phase1Idx = 0;
  const getWeakest = () => {
    let w = 'fractions', min = 100;
    allTopics.forEach(t => { if(state.currentScores[t] < min) { min = state.currentScores[t]; w = t; } });
    return w;
  };
  dates.forEach((dObj, idx) => {
    let phase, topic, desc;
    if (idx < p1) {
      phase = 'יסודות'; topic = allTopics[phase1Idx % 3]; phase1Idx++;
      desc = `סוקרים את כל המגרש - ${topicsHebrew[topic]}`;
    } else if (idx < p2) {
      phase = 'חיזוק';
      topic = (Math.random() > 0.3) ? getWeakest() : allTopics[Math.floor(Math.random()*3)];
      desc = `חיזוק שרירים בנושא ${topicsHebrew[topic]}`;
    } else {
      phase = 'שיא'; topic = 'mixed';
      desc = `הכנה למשחק הגדול - תרגול משולב`;
    }
    let qCount = state.plan.dailyDuration === 10 ? 8 : (state.plan.dailyDuration === 15 ? 12 : 16);
    if (idx === total - 1) {
      phase = 'שיא'; topic = 'mixed';
      desc = 'אימון קל אחרון לפני המבחן! 🏆';
      qCount = 5;
    }
    plan.push({day: dayNum++, dateStr: dObj.toISOString().split('T')[0], phase, topic, desc, qCount});
  });
  state.plan.trainingPlan = plan;
}

function getSmartReminder() {
  if(!state.plan || !state.testCompleted) return "";
  const today = new Date().toISOString().split('T')[0];
  const exam = state.plan.examDate;
  if (today === exam) return `🏆 ${state.name}, בהצלחה במבחן היום! אתה מוכן! 🔥`;
  if (today > exam) return `🎉 איך היה המבחן? רוצה להמשיך לתרגל?`;
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
  if (tomorrow.toISOString().split('T')[0] === exam) return `🚨 המבחן מחר! אימון קל אחרון 💪`;
  if (state.plan.lastSessionDate === today) return `✅ כל הכבוד שתרגלת היום!`;
  if (state.plan.lastSessionDate) {
    const lastD = new Date(state.plan.lastSessionDate);
    const tD = new Date(today);
    const diff = (tD - lastD) / (1000*3600*24);
    if (diff > 1) return `👋 פספסת לאחרונה - לא נורא! בוא נחזור לעניינים.`;
  }
  return `🏀 ${state.name}, האימון של היום מחכה לך! ${state.plan.dailyDuration} דקות וסיימת ⚡`;
}

let sessionQueue = [];
let currentQIndex = 0;
let isDiagnostic = false;
let sessionStats = { total: 0, correct: 0, startTime: 0 };

function startDiagnostic() {
  isDiagnostic = true; isDailySession = false;
  const getQs = (t, count) => qBank.filter(q => q.topic === t && q.difficulty < 3).sort(() => 0.5 - Math.random()).slice(0, count);
  sessionQueue = [...getQs('fractions', 4), ...getQs('natural', 4), ...getQs('geometry', 4)].sort(() => 0.5 - Math.random());
  currentQIndex = 0;
  sessionStats = { total: sessionQueue.length, correct: 0, startTime: Date.now() };
  renderActiveQuestion();
}

function renderTopics() {
  root.innerHTML = `
    <div style="display:flex; justify-content:space-between; margin-bottom:20px; align-items:center; flex-wrap:wrap; gap:10px;">
      <h2 style="font-size: 28px; color:#1a1a1a; margin:0;">בחר עמדת אימון</h2>
      <button class="btn-large btn-white" style="padding:10px 20px; font-size:18px; min-height:50px;" onclick="renderMenu()">חזור ↩</button>
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;">
      <div class="topic-card" onclick="startPractice('fractions')">
        <div style="font-size:50px; margin-bottom:8px;">🍕</div>
        <div style="font-size:20px;">שברים</div>

      </div>

        <div style="font-size:50px; margin-bottom:8px;">🔢</div>

        <div style="font-size:15px; color:#FF6B35; margin-top:5px;">${state.currentScores.natural}%</div>
      </div>
      <div class="topic-card" onclick="startPractice('geometry')">
        <div style="font-size:50px; margin-bottom:8px;">📐</div>
        <div style="font-size:20px;">גיאומטריה</div>
        <div style="font-size:15px; color:#FF6B35; margin-top:5px;">${state.currentScores.geometry}%</div>
      </div>
    </div>
  `;
}

function startPractice(topic, count=10) {
  isDiagnostic = false;
  let available = topic === 'mixed' ? qBank : qBank.filter(q => q.topic === topic);
  if(topic !== 'mixed') {
    const lvl = state.level[topic] || 1;
    const suited = available.filter(q => q.difficulty <= lvl);
    if(suited.length > 5) available = suited;
  }
  sessionQueue = available.sort(() => 0.5 - Math.random()).slice(0, count);
  currentQIndex = 0;
  sessionStats = { total: sessionQueue.length, correct: 0, startTime: Date.now() };
  renderActiveQuestion();
}

function renderActiveQuestion() {
  if (currentQIndex >= sessionQueue.length) { finishSession(); return; }
  const q = sessionQueue[currentQIndex];
  const pct = ((currentQIndex) / sessionStats.total) * 100;
  const min = Math.floor((Date.now() - sessionStats.startTime) / 60000);
  let inputHTML = '';
  if (q.options) {
    inputHTML = `<div class="q-options">`;
    q.options.forEach(opt => {
      const d = opt.includes('/') ? `<div class="fraction" style="font-size:28px;"><span>${opt.split('/')[0]}</span><span>${opt.split('/')[1]}</span></div>` : opt;
      inputHTML += `<button class="btn-large btn-white" onclick="checkAnswer('${opt}')">${d}</button>`;
    });
    inputHTML += `</div>`;
  } else {
    inputHTML = `
      <div style="width: 100%; max-width:400px; margin: 18px auto;">
        <input type="text" id="answerInput" inputmode="numeric" pattern="[0-9]*" enterkeyhint="done" placeholder="הקש תשובה..." dir="ltr" onkeypress="if(event.key==='Enter') document.getElementById('chkBtn').click();">
        <button id="chkBtn" class="btn-large btn-orange" style="width:100%; margin-top:15px;" onclick="checkAnswer(document.getElementById('answerInput').value)">זרוק לסל! 🤾‍♂️</button>
      </div>`;
  }
  root.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:10px;">
      <div class="session-stats-bar">
        <span>שאלה ${currentQIndex+1}/${sessionStats.total}</span>
        <span style="color:#666;">⏱️ ${min} דק'</span>
        <span style="color:#28a745;">🔥 ${sessionStats.correct}</span>
      </div>
      <button class="btn-large btn-white" style="padding:8px 18px; font-size:16px; min-height:44px;" onclick="renderMenu()">פסק זמן ⏸</button>
    </div>
    <div class="bar-container" style="background:#e9ecef; border:2px solid #ccc; height:20px; margin-bottom:18px;">
      <div class="bar-fill" style="width:${pct}%; background-color:#FF6B35;"></div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center;">
      <div class="qbox">${q.question}</div>
      ${inputHTML}
      <div style="margin-top:18px; width:100%; display:flex; gap:12px; justify-content:center; flex-wrap:wrap;" id="uploadSection">
        <label class="upload-area" style="flex:1; min-width:200px; max-width:280px;">
          <input type="file" accept="image/*" capture="environment" style="display:none;" onchange="handleImageUpload(event)">
          <span style="font-size:22px;">📸 צלם פתרון</span>
        </label>
        <label class="upload-area" style="flex:1; min-width:200px; max-width:280px;">
          <input type="file" accept="image/*" style="display:none;" onchange="handleImageUpload(event)">
          <span style="font-size:22px;">🖼️ בחר מגלריה</span>
        </label>
      </div>
      <div id="imagePreview" style="display:none; text-align:center; margin-top:12px; width:100%;">
        <img id="uploadedImg" src="" style="max-width:100%; max-height:200px; border-radius:15px; border:3px solid #1a1a1a;">
        <div id="aiFeedbackLoader" style="color:#FF6B35; font-size:20px; font-weight:bold; margin-top:10px;">המאמן צופה במהלך... ⏱</div>
      </div>
      <div id="feedbackBox" class="feedback-box" style="width:100%;"></div>
      <button id="nextBtn" class="btn-large btn-black" style="display:none; margin-top:20px; width:100%; max-width:400px;" onclick="renderActiveQuestion()">לזריקה הבאה ➡</button>
    </div>
  `;
  if(!q.options) setTimeout(() => { const inp = document.getElementById('answerInput'); if(inp) inp.focus(); }, 300);
}

function checkAnswer(userAns) {
  const q = sessionQueue[currentQIndex];
  const cleanUser = userAns.toString().trim();
  if(!cleanUser) return;
  const isCorrect = cleanUser === q.answer;
  q.userIsCorrect = isCorrect;
  const fb = document.getElementById('feedbackBox');
  fb.style.display = 'block';
  const us = document.getElementById('uploadSection');
  if(us) us.style.display = 'none';
  if (isCorrect) {
    sessionStats.correct++;
    state.score += 10;
    state.streak++;
    saveState();
    fb.className = 'feedback-box feedback-correct';
    fb.innerHTML = `שלשה מהקשת! 🎯 ${state.name}, מושלם! 💯<br><span style="font-size:18px; font-weight:normal;">${q.explanation}</span>`;
  } else {
    state.streak = 0;
    saveState();
    fb.className = 'feedback-box feedback-wrong';
    let fa = q.answer;
    if(fa.includes('/')) fa = `<div class="fraction"><span>${q.answer.split('/')[0]}</span><span>${q.answer.split('/')[1]}</span></div>`;
    fb.innerHTML = `החטאה קלה, קורה גם לאלופים! 🏀<br>התשובה הנכונה: ${fa}<br><div style="font-size:18px; font-weight:normal; margin-top:12px; background:#fff; padding:12px; border-radius:10px; border:2px solid #dc3545;"><strong>ניתוח המהלך:</strong> ${q.explanation}</div>`;
  }
  currentQIndex++;
  const inputs = document.querySelectorAll('button:not(#nextBtn), input');
  inputs.forEach(el => {
    if(!el.textContent.includes('פסק זמן')) {
      el.style.pointerEvents = 'none';
      if(el.tagName==='BUTTON') el.style.opacity = '0.5';
    }
  });
  const nb = document.getElementById('nextBtn');
  nb.style.display = 'inline-flex';
  setTimeout(() => nb.scrollIntoView({behavior:"smooth"}), 100);
}

// 🏀 ניתוח תמונת פתרון בכתב יד באמצעות Gemini AI
// פונקציה לדחיסת תמונה לפני שליחה (חוסך עלויות ומאיץ)
async function compressImage(file, maxWidth = 1280, quality = 0.85) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width;
        let height = img.height;
        if (width > maxWidth) {
          height = (height * maxWidth) / width;
          width = maxWidth;
        }
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function handleImageUpload(e) {
  const file = e.target.files[0];
  if (!file) return;

  // הצגה מיידית של תצוגה מקדימה
  document.getElementById('uploadSection').style.display = 'none';
  const pv = document.getElementById('imagePreview');
  pv.style.display = 'block';

  try {
    // דחיסת התמונה
    const compressedDataUrl = await compressImage(file);
    document.getElementById('uploadedImg').src = compressedDataUrl;
    setTimeout(() => pv.scrollIntoView({ behavior: 'smooth' }), 100);

    // הצגת מצב טעינה אנימטיבי
    const loader = document.getElementById('aiFeedbackLoader');
    loader.innerHTML = `
      <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
        <div style="font-size:48px; animation: spin 1.2s linear infinite;">🏀</div>
        <div style="color:#FF6B35; font-size:20px; font-weight:bold;">המאמן בוחן את המהלך שלך...</div>
        <div style="color:#666; font-size:16px;">קורא את הפתרון ובודק כל שלב</div>
      </div>
      <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>`;

    // הכנת נתונים לשליחה ל-backend
    const currentQuestion = sessionQueue[currentQIndex];
    const requestBody = {
      imageBase64: compressedDataUrl,
      question: currentQuestion.q || currentQuestion.question || '',
      correctAnswer: String(currentQuestion.a || currentQuestion.answer || ''),
      topic: currentQuestion.topic || '',
      studentName: state.name || ''
    };

    // שליחה ל-backend
    const response = await fetch('/api/analyze-solution', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(requestBody)
    });

    if (!response.ok) {
      const errorData = await response.json().catch(() => ({}));
      throw new Error(errorData.error || 'שגיאה בניתוח התמונה');
    }

    const data = await response.json();
    const analysis = data.analysis;

    // הצגת הניתוח האמיתי
    displayAIAnalysis(analysis);

  } catch (error) {
    console.error('Image analysis error:', error);
    document.getElementById('aiFeedbackLoader').innerHTML = `
      <div style="background:#ffe4e4; padding:18px; border-radius:15px; border:3px solid #DC143C; color:#1a1a1a; margin-top:12px; text-align:right;">
        <strong style="font-size:20px;">😅 אופס, הייתה בעיה</strong><br><br>
        ${error.message || 'לא הצלחתי לנתח את התמונה. נסה לצלם שוב בתאורה טובה יותר.'}<br><br>
        <button onclick="retryImageUpload()" style="background:#FF6B35; color:white; border:none; padding:12px 24px; border-radius:25px; font-size:18px; font-weight:bold; cursor:pointer; margin-top:10px;">📸 נסה שוב</button>
      </div>`;
  }
}

function retryImageUpload() {
  document.getElementById('imagePreview').style.display = 'none';
  document.getElementById('uploadSection').style.display = 'flex';
  document.getElementById('aiFeedbackLoader').innerHTML = '';
  // איפוס ה-input
  document.querySelectorAll('#uploadSection input[type=file]').forEach(inp => inp.value = '');
}

function displayAIAnalysis(analysis) {
  const loader = document.getElementById('aiFeedbackLoader');

  // אם התמונה לא קריאה
  if (analysis.imageReadable === false) {
    loader.innerHTML = `
      <div style="background:#fff3cd; padding:20px; border-radius:15px; border:3px solid #FFC107; color:#1a1a1a; margin-top:12px; text-align:right;">
        <strong style="font-size:22px;">📷 לא הצלחתי לקרוא את התמונה</strong><br><br>
        <span style="font-size:17px;">${analysis.imageIssue || 'התמונה לא מספיק ברורה'}</span><br><br>
        <strong>💡 טיפים לצילום טוב:</strong>
        <ul style="font-size:16px; line-height:1.8;">
          <li>וודא תאורה טובה (בלי צללים)</li>
          <li>החזק את הטלפון ישר מעל הדף</li>
          <li>וודא שכל הפתרון נכנס בפריים</li>
          <li>כתוב בעיפרון כהה או עט</li>
        </ul>
        <button onclick="retryImageUpload()" style="background:#FF6B35; color:white; border:none; padding:12px 24px; border-radius:25px; font-size:18px; font-weight:bold; cursor:pointer; margin-top:10px;">📸 צלם שוב</button>
      </div>`;
    return;
  }

  // צבע רקע לפי תוצאה
  const isCorrect = analysis.isCorrect === true;
  const mainColor = isCorrect ? '#2d8f3f' : '#FF6B35';
  const bgColor = isCorrect ? '#e8f5e9' : '#fff5f0';
  const emoji = isCorrect ? '🏀✨' : '💪';
  const headerText = isCorrect ? 'סל! מהלך מנצח!' : 'בוא נראה מה קרה';

  // ציון בכוכבי כדורסל
  const score = analysis.overallScore || 3;
  const stars = '🏀'.repeat(score) + '⚪'.repeat(5 - score);

  let stepsHtml = '';
  if (analysis.stepsIdentified && analysis.stepsIdentified.length > 0) {
    stepsHtml = '<div style="margin-top:15px;"><strong style="font-size:18px;">📋 השלבים שזיהיתי:</strong><br>';
    analysis.stepsIdentified.forEach(step => {
      const stepIcon = step.isStepCorrect ? '✅' : '❌';
      stepsHtml += `<div style="background:white; padding:10px 14px; border-radius:10px; margin:8px 0; border-right:4px solid ${step.isStepCorrect ? '#2d8f3f' : '#DC143C'};">
        <strong>${stepIcon} שלב ${step.stepNumber}:</strong> ${step.whatStudentDid}<br>
        <em style="color:#666; font-size:14px;">${step.comment || ''}</em>
      </div>`;
    });
    stepsHtml += '</div>';
  }

  let mistakeHtml = '';
  if (analysis.mistakeFound && analysis.mistakeLocation) {
    mistakeHtml = `<div style="background:#ffe4e4; padding:14px; border-radius:12px; margin-top:12px; border-right:4px solid #DC143C;">
      <strong style="font-size:17px;">🎯 איפה הייתה החטאה:</strong><br>
      <span style="font-size:16px;">${analysis.mistakeLocation}</span>
    </div>`;
  }

  let correctApproachHtml = '';
  if (analysis.correctApproach) {
    correctApproachHtml = `<div style="background:#e3f2fd; padding:14px; border-radius:12px; margin-top:12px; border-right:4px solid #1976d2;">
      <strong style="font-size:17px;">💡 הדרך הנכונה לפתור:</strong><br>
      <span style="font-size:16px; line-height:1.6;">${analysis.correctApproach}</span>
    </div>`;
  }

  loader.innerHTML = `
    <div style="background:${bgColor}; padding:20px; border-radius:18px; border:3px solid ${mainColor}; color:#1a1a1a; margin-top:12px; text-align:right;">
      <div style="text-align:center; margin-bottom:15px;">
        <div style="font-size:32px;">${emoji}</div>
        <strong style="font-size:24px; color:${mainColor};">${headerText}</strong><br>
        <div style="font-size:24px; margin-top:8px;">${stars}</div>
      </div>

      ${analysis.studentAnswer ? `<div style="background:white; padding:12px; border-radius:10px; margin-bottom:12px;">
        <strong>📝 התשובה שכתבת:</strong> <span style="font-size:20px; font-weight:bold; color:${mainColor};">${analysis.studentAnswer}</span>
      </div>` : ''}

      ${stepsHtml}
      ${mistakeHtml}
      ${correctApproachHtml}

      <div style="background:${mainColor}; color:white; padding:14px; border-radius:12px; margin-top:15px;">
        <strong style="font-size:18px;">🏀 המאמן אומר:</strong><br>
        <span style="font-size:17px; line-height:1.6;">${analysis.coachFeedback || 'המשך לתרגל!'}</span>
      </div>

      ${analysis.nextTimeAdvice ? `<div style="margin-top:12px; padding:12px; background:white; border-radius:10px;">
        <strong>🎯 לפעם הבאה:</strong> <span style="font-size:16px;">${analysis.nextTimeAdvice}</span>
      </div>` : ''}

      <div style="text-align:center; margin-top:15px;">
        <button onclick="retryImageUpload()" style="background:white; color:${mainColor}; border:2px solid ${mainColor}; padding:10px 20px; border-radius:25px; font-size:16px; font-weight:bold; cursor:pointer;">📸 צלם שוב</button>
      </div>
    </div>`;
}

function updateTopicScores() {
  let stats = { fractions:{t:0,c:0}, natural:{t:0,c:0}, geometry:{t:0,c:0} };
  sessionQueue.forEach(q => {
    if(stats[q.topic]) {
      stats[q.topic].t++;
      if(q.userIsCorrect) stats[q.topic].c++;
    }
  });
  ['fractions','natural','geometry'].forEach(t => {
    if(stats[t].t > 0) {
      let pct = Math.round((stats[t].c / stats[t].t) * 100);
      if(isDiagnostic) { state.initialScores[t] = pct; state.currentScores[t] = pct; }
      else state.currentScores[t] = Math.round((state.currentScores[t] * 2 + pct) / 3);
      const lvl = state.currentScores[t] > 85 ? 3 : (state.currentScores[t] > 55 ? 2 : 1);
      state.level[t] = lvl;
      if(isDiagnostic) state.initialLevel[t] = lvl;
    }
  });
}

function finishSession() {
  const pct = Math.round((sessionStats.correct / sessionStats.total) * 100);
  const min = Math.max(1, Math.floor((Date.now() - sessionStats.startTime) / 60000));
  updateTopicScores();
  if(isDiagnostic) {
    state.testCompleted = true;
    saveState();
    generateTrainingPlan();
    saveState();
    root.innerHTML = `
      <div style="text-align:center; padding:20px;">
        <h2 style="font-size: 36px; color: #1a1a1a;">סיימנו מוקדמות! ⏱</h2>
        <p style="font-size: 28px; font-weight:bold; margin: 20px 0;">אחוז הצלחה: ${pct}%</p>
        <p style="font-size: 20px; margin-bottom: 30px;">המאמן ניתח את הנתונים ותוכנית האימונים שלך מוכנה!</p>
        <button class="btn-large btn-orange" style="font-size:26px; padding:18px 40px;" onclick="renderMenu()">קדימה לתוכנית! 🏠</button>
      </div>`;
    return;
  }
  if(isDailySession) {
    state.plan.lastSessionDate = new Date().toISOString().split('T')[0];
    state.plan.currentDay++;
    saveState();
    root.innerHTML = `
      <div style="text-align:center; padding:20px; background:#f0fff4; border-radius:25px; border:4px solid #28a745;">
        <h2 style="font-size: 32px; color: #1a1a1a; margin:0 0 15px 0;">🎉 סיימת את האימון של היום! 🏀</h2>
        <div style="background:#fff; border:3px solid #1a1a1a; border-radius:20px; padding:18px; margin-bottom:20px;">
          <div style="font-size:20px; margin-bottom:8px;">✅ <strong>נכון:</strong> ${sessionStats.correct}/${sessionStats.total} (${pct}%)</div>
          <div style="font-size:20px; margin-bottom:8px;">⏱️ <strong>זמן:</strong> ${min} דק'</div>
          <div style="font-size:20px; margin-bottom:8px;">🏆 <strong>ניקוד:</strong> +${sessionStats.correct * 10}</div>
          <div style="font-size:20px;">🔥 <strong>רצף:</strong> ${state.streak}</div>
        </div>
        <h3 style="font-size: 24px; color:#28a745; margin-bottom: 20px;">🎯 ${state.name}, אתה אלוף!<br>לך תיהנה - משוחרר! 👋</h3>
        <button class="btn-large btn-black" style="font-size:22px;" onclick="renderMenu()">חזרה למסך הראשי</button>
      </div>`;
    return;
  }
  saveState();
  root.innerHTML = `
    <div style="text-align:center; padding:20px;">
      <h2 style="font-size: 32px; color: #1a1a1a;">הבאזר צלצל! ⏱</h2>
      <div style="font-size: 70px; margin: 15px 0;">${pct >= 80 ? '🏆 MVP' : pct >= 50 ? '🏅' : '💪'}</div>
      <p style="font-size: 26px; font-weight:bold; margin-bottom: 8px;">${sessionStats.correct}/${sessionStats.total} זריקות</p>
      <p style="font-size: 22px; color: #FF6B35; margin-bottom: 25px;">אחוז הצלחה: ${pct}%</p>
      <button class="btn-large btn-orange" style="font-size:26px; padding:18px 40px;" onclick="renderMenu()">חזרה לספסל 🏠</button>
    </div>`;
}

function renderReport() {
  const today = new Date();
  const examD = state.plan ? new Date(state.plan.examDate) : new Date();
  const diffDays = Math.ceil((examD - today) / (1000*60*60*24));
  const getChange = (t) => {
    const init = state.initialScores[t] || 0;
    const cur = state.currentScores[t] || 0;
    const diff = cur - init;
    const color = diff > 0 ? '#28a745' : '#666';
    const sign = diff > 0 ? '+' : '';
    return `<strong>${init}% ➡ ${cur}%</strong> <span style="color:${color}; font-weight:bold;">(${sign}${diff}%)</span>`;
  };
  root.innerHTML = `
    <div style="display:flex; justify-content:space-between; margin-bottom:18px; align-items:center; flex-wrap:wrap; gap:10px;">
      <h2 style="font-size: 28px; color:#1a1a1a; margin:0;">📊 ${state.name}</h2>
      <button class="btn-large btn-white" style="padding:10px 20px; font-size:18px; min-height:50px;" onclick="renderMenu()">חזור ↩</button>
    </div>
    <div style="background:#fff5f0; padding:15px; border-radius:15px; border:2px solid #FF6B35; margin-bottom:18px;">
      <h3 style="margin:0; font-size:20px;">📅 ימים עד המבחן: <span style="color:#FF6B35; font-size:28px;">${diffDays > 0 ? diffDays : 0}</span></h3>
      <h3 style="margin:8px 0 0 0; font-size:20px;">✅ סשנים: <span style="color:#28a745;">${state.plan ? state.plan.currentDay-1 : 0}</span>/${state.plan ? state.plan.trainingPlan.length : 0}</h3>
    </div>
    <div style="display:flex; gap:15px; margin-bottom:18px; flex-wrap:wrap;">
      <div style="flex:1; min-width:140px; background:#fff; padding:20px; border-radius:20px; text-align:center; border:3px solid #1a1a1a; box-shadow:0 5px 0 #1a1a1a;">
        <div style="font-size:48px; color:#1a1a1a; font-weight:900;">${state.score}</div>
        <div style="font-size:18px; color:#666; font-weight:bold;">נקודות בקריירה</div>
      </div>
      <div style="flex:1; min-width:140px; background:#fff; padding:20px; border-radius:20px; text-align:center; border:3px solid #FF6B35; box-shadow:0 5px 0 #FF6B35;">
        <div style="font-size:48px; color:#FF6B35; font-weight:900;">${state.streak} 🔥</div>
        <div style="font-size:18px; color:#666; font-weight:bold;">רצף קליעות</div>
      </div>
    </div>
    <div style="background:#fff; border:3px solid #1a1a1a; border-radius:20px; padding:18px; margin-bottom:18px;">
      <h3 style="margin:0 0 12px 0; font-size:22px;">📈 התקדמות מאז האבחון:</h3>
      <div style="font-size:18px; margin-bottom:8px;">🍕 שברים: ${getChange('fractions')}</div>
      <div style="font-size:18px; margin-bottom:8px;">🔢 מספרים: ${getChange('natural')}</div>
      <div style="font-size:18px;">📐 גיאומטריה: ${getChange('geometry')}</div>
    </div>
    <button class="btn-large btn-red" style="width:100%;" onclick="if(confirm('בטוח לאפס הכל?')){localStorage.removeItem('basketMathChampionsV5');location.reload();}">🔄 אפס נתונים ותוכנית</button>
  `;
}

loadState();
if(state.name) {
  if(!state.plan) renderPlanSetup();
  else renderMenu();
} else renderLogin();
updateHeader();

</script>
